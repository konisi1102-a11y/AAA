<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUGGLER SLOT</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  font-family:sans-serif;
  color:white;
  text-align:center;
}

/* ヘッダー */
header{
  background:linear-gradient(to right, red, orange);
  padding:20px;
  font-size:32px;
  font-weight:bold;
  letter-spacing:3px;
}

/* ヒーロー */
.hero{
  padding:40px 20px;
}

.hero h1{
  font-size:48px;
  color:yellow;
  text-shadow:0 0 15px red;
  margin-bottom:20px;
}

/* GOGOランプ風 */
.gogo{
  margin:30px auto;
  width:200px;
  height:200px;
  border-radius:50%;
  background:radial-gradient(circle, #ff00ff, #990099);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:bold;
  color:white;
  animation:blink 1s infinite alternate;
  box-shadow:0 0 30px magenta;
}

@keyframes blink{
  from{ box-shadow:0 0 10px magenta; }
  to{ box-shadow:0 0 40px yellow; }
}

/* 機種カード */
.section{
  padding:50px 20px;
}

.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

.card{
  background:#111;
  border:3px solid gold;
  padding:20px;
  width:250px;
  border-radius:10px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px gold;
}

footer{
  background:#111;
  padding:20px;
  margin-top:40px;
  border-top:2px solid red;
}

/* レスポンシブ */
@media(max-width:700px){
  .hero h1{
    font-size:32px;
  }
  .gogo{
    width:150px;
    height:150px;
    font-size:24px;
  }
}
</style>

</head>
<body>

<header>
🎰 JUGGLER SLOT 🎰
</header>

<section class="hero">
<h1>BIG BONUS!!</h1>
<div class="gogo">GOGO!</div>
</section>

<section class="section">
<h2>人気機種</h2>
<div class="cards">
  <div class="card">
    <h3>マイジャグラー</h3>
    <p>王道の光！</p>
  </div>
  <div class="card">
    <h3>ゴーゴージャグラー</h3>
    <p>安心の安定感！</p>
  </div>
  <div class="card">
    <h3>アイムジャグラー</h3>
    <p>元祖シリーズ！</p>
  </div>
</div>
</section>

<footer>
© 2026 Juggler Fan Site
</footer>

</body>
</html>
